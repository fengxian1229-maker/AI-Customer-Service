services:
  ai-webhook:
    image: ai-customer-service:latest
    restart: unless-stopped
    mem_limit: ${AI_WEBHOOK_MEMORY_LIMIT:-512m}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    env_file:
      - production.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-service-account.json
      MYSQL_POOL_MINSIZE: ${MYSQL_POOL_MINSIZE:-1}
      MYSQL_POOL_MAXSIZE: ${MYSQL_POOL_MAXSIZE:-50}
    command: ["python", "-m", "app.workers.webhook_server", "--host", "0.0.0.0", "--port", "8087"]
    ports:
      - "8087:8087"
    secrets:
      - source: google_service_account
        target: google-service-account.json

  ai-worker:
    image: ai-customer-service:latest
    restart: unless-stopped
    mem_limit: ${AI_WORKER_MEMORY_LIMIT:-2g}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    env_file:
      - production.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-service-account.json
      MYSQL_POOL_MINSIZE: ${MYSQL_POOL_MINSIZE:-1}
      MYSQL_POOL_MAXSIZE: ${MYSQL_POOL_MAXSIZE:-50}
      GATEWAY_CONCURRENCY: ${GATEWAY_CONCURRENCY:-15}
      SENDER_CONCURRENCY: ${SENDER_CONCURRENCY:-15}
      EXTERNAL_COMMAND_CONCURRENCY: ${EXTERNAL_COMMAND_CONCURRENCY:-15}
      EXTERNAL_RESULT_CONCURRENCY: ${EXTERNAL_RESULT_CONCURRENCY:-15}
      EXTERNAL_BACKEND_CONCURRENCY: ${EXTERNAL_BACKEND_CONCURRENCY:-5}
      EXTERNAL_TELEGRAM_CONCURRENCY: ${EXTERNAL_TELEGRAM_CONCURRENCY:-5}
      EXTERNAL_HANDOFF_CONCURRENCY: ${EXTERNAL_HANDOFF_CONCURRENCY:-3}
      TELEGRAM_REPLY_CONCURRENCY: ${TELEGRAM_REPLY_CONCURRENCY:-1}
      WORKER_LEASE_SECONDS: ${WORKER_LEASE_SECONDS:-300}
      WORKER_LEASE_RECOVERY_SECONDS: ${WORKER_LEASE_RECOVERY_SECONDS:-60}
    command: ["python", "-m", "app.workers.service_runner", "--all"]
    secrets:
      - source: google_service_account
        target: google-service-account.json

  ai-daily-chat-report:
    image: ai-customer-service:latest
    restart: unless-stopped
    mem_limit: ${AI_DAILY_CHAT_REPORT_MEMORY_LIMIT:-1g}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    env_file:
      - production.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-service-account.json
      MYSQL_POOL_MINSIZE: ${MYSQL_POOL_MINSIZE:-1}
      MYSQL_POOL_MAXSIZE: ${MYSQL_POOL_MAXSIZE:-20}
      DAILY_CHAT_REPORT_ENABLED: ${DAILY_CHAT_REPORT_ENABLED:-true}
      DAILY_CHAT_REPORT_SOURCE: ${DAILY_CHAT_REPORT_SOURCE:-lingxi}
      DAILY_CHAT_REPORT_TIME: ${DAILY_CHAT_REPORT_TIME:-09:00}
      DAILY_CHAT_REPORT_TIMEZONE: ${DAILY_CHAT_REPORT_TIMEZONE:-Asia/Shanghai}
    command: ["python", "-m", "app.reporting.daily_chat_report.scheduler"]
    secrets:
      - source: google_service_account
        target: google-service-account.json

  db-create:
    image: mysql:8
    profiles: ["tools"]
    env_file:
      - production.env
    command:
      - sh
      - -c
      - >
        mysql
        -h "$$MYSQL_HOST"
        -P "$$MYSQL_PORT"
        -u "$$MYSQL_USER"
        -p"$$MYSQL_PASSWORD"
        -e "CREATE DATABASE IF NOT EXISTS \`$$MYSQL_DATABASE\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

secrets:
  google_service_account:
    file: /opt/ai-cs/secrets/google-service-account.json
